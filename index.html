<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE LAST COMPILER | A Journey Into Computational Thinking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020204;
      --bg: #05050a;
      --bg-light: #0a0a15;
      --bg-lighter: #101025;
      --aria: #00f7ff;
      --aria-dim: #007a80;
      --corrupt: #ff2d6a;
      --corrupt-dim: #801645;
      --success: #00ff9d;
      --success-dim: #008052;
      --danger: #ffaa00;
      --text: #e0e0e8;
      --text-dim: #606080;
      --text-dimmer: #404060;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: var(--bg-deep);
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0,247,255,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,45,106,0.02) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0,255,157,0.01) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
      animation: scanlineMove 8s linear infinite;
    }

    @keyframes scanlineMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(3px); }
    }

    #game-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--aria);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      25% { transform: translateY(-30px) translateX(10px); opacity: 0.5; }
      50% { transform: translateY(-10px) translateX(-10px); opacity: 0.2; }
      75% { transform: translateY(-40px) translateX(5px); opacity: 0.4; }
    }

    /* ═══════════════════════════════════════
       TITLE SCREEN
    ═══════════════════════════════════════ */
    #title-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      position: relative;
    }

    .title-container {
      position: relative;
    }

    .title-main {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--aria) 0%, #fff 50%, var(--corrupt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 3s ease-in-out infinite;
      text-shadow: 0 0 60px rgba(0,247,255,0.5);
      position: relative;
    }

    @keyframes titleGlow {
      0%, 100% { filter: brightness(1) blur(0); }
      50% { filter: brightness(1.2) blur(0.5px); }
    }

    .title-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      color: var(--text-dim);
      letter-spacing: 0.5em;
      margin-top: 10px;
      font-weight: 300;
    }

    .title-version {
      position: absolute;
      top: -30px;
      right: -50px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--corrupt);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--aria), transparent);
      margin: 30px auto;
    }

    .title-credit {
      margin-top: 40px;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
    }

    .title-credit .highlight {
      color: var(--aria);
      font-weight: 600;
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--aria);
      color: var(--aria);
      padding: 18px 50px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,247,255,0.2), transparent);
      transition: left 0.5s;
    }

    .start-btn:hover {
      background: rgba(0,247,255,0.1);
      box-shadow: 
        0 0 30px rgba(0,247,255,0.3),
        inset 0 0 30px rgba(0,247,255,0.1);
      transform: scale(1.02);
    }

    .start-btn:hover::before {
      left: 100%;
    }

    /* ═══════════════════════════════════════
       MAIN GAME SCREEN
    ═══════════════════════════════════════ */
    #game-screen {
      display: none;
      padding-top: 20px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .chapter-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: var(--aria);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .progress-text {
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Progress bar */
    .progress-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--bg-light);
      z-index: 9998;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--aria), var(--success));
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px var(--aria);
    }

    /* ARIA container */
    #aria-container {
      background: linear-gradient(135deg, rgba(0,247,255,0.03) 0%, transparent 60%);
      border: 1px solid rgba(0,247,255,0.15);
      border-radius: 4px;
      padding: 25px;
      margin-bottom: 25px;
      position: relative;
      backdrop-filter: blur(5px);
    }

    #aria-container::before {
      content: '◇ ARIA';
      position: absolute;
      top: -10px;
      left: 25px;
      background: var(--bg-deep);
      padding: 0 15px;
      color: var(--aria);
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }

    #aria-text {
      font-size: 1.15rem;
      line-height: 1.9;
      min-height: 60px;
      font-weight: 300;
    }

    /* Code poetry styling */
    .code-poetry {
      color: var(--aria);
      font-family: 'Fira Code', monospace;
      font-style: italic;
      font-weight: 400;
    }

    .corrupt {
      color: var(--corrupt);
      animation: corruptPulse 1.5s infinite;
    }

    @keyframes corruptPulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 5px var(--corrupt); }
      50% { opacity: 0.7; text-shadow: 0 0 15px var(--corrupt); }
    }

    .emphasis {
      color: var(--success);
      font-weight: 500;
    }

    .whisper {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    /* Game area */
    #game-area {
      background: rgba(10,10,21,0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 4px;
      padding: 30px;
      margin-bottom: 20px;
      min-height: 200px;
      position: relative;
    }

    #scene-description {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 25px;
      color: var(--text);
      font-weight: 300;
    }

    /* Choices */
    #choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      padding: 16px 22px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      border-radius: 3px;
      letter-spacing: 0.05em;
      position: relative;
    }

    .choice-btn:hover {
      border-color: var(--aria);
      background: rgba(0,247,255,0.05);
      transform: translateX(8px);
      color: var(--aria);
    }

    .choice-btn::before {
      content: '▸';
      margin-right: 12px;
      color: var(--text-dimmer);
      transition: all 0.25s;
    }

    .choice-btn:hover::before {
      color: var(--aria);
      margin-right: 16px;
    }

    /* Puzzle area */
    #puzzle-area {
      display: none;
      background: rgba(0,255,157,0.02);
      border: 1px solid rgba(0,255,157,0.2);
      border-radius: 4px;
      padding: 25px;
      margin-bottom: 20px;
      animation: puzzleFadeIn 0.4s ease;
    }

    @keyframes puzzleFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #puzzle-prompt {
      color: var(--success);
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-family: 'Fira Code', monospace;
    }

    #puzzle-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid rgba(0,255,157,0.3);
      color: var(--text);
      padding: 14px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      margin-bottom: 15px;
      border-radius: 3px;
      transition: all 0.3s;
    }

    #puzzle-input:focus {
      outline: none;
      border-color: var(--success);
      box-shadow: 0 0 15px rgba(0,255,157,0.2);
    }

    #puzzle-submit {
      background: linear-gradient(135deg, var(--success), var(--success-dim));
      color: var(--bg-deep);
      border: none;
      padding: 14px 35px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    #puzzle-submit:hover {
      box-shadow: 0 0 25px rgba(0,255,157,0.4);
      transform: translateY(-2px);
    }

    #puzzle-feedback {
      margin-top: 18px;
      padding: 15px;
      border-radius: 3px;
      display: none;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    #puzzle-feedback.success {
      display: block;
      background: rgba(0,255,157,0.08);
      border-left: 3px solid var(--success);
      color: var(--success);
    }

    #puzzle-feedback.error {
      display: block;
      background: rgba(255,45,106,0.08);
      border-left: 3px solid var(--corrupt);
      color: var(--corrupt);
    }

    /* Memory Fragment */
    #memory-fragment {
      display: none;
      background: linear-gradient(135deg, rgba(0,255,157,0.05) 0%, transparent 50%);
      border: 1px solid rgba(0,255,157,0.3);
      border-radius: 4px;
      padding: 25px;
      margin-top: 20px;
      animation: memoryReveal 1s ease;
    }

    @keyframes memoryReveal {
      0% { opacity: 0; transform: scale(0.98) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    #memory-fragment h3 {
      color: var(--success);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      margin-bottom: 15px;
      letter-spacing: 0.2em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #memory-fragment h3::before {
      content: '◈';
      animation: memoryPulse 2s infinite;
    }

    @keyframes memoryPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #memory-content {
      color: var(--text);
      line-height: 1.8;
      font-size: 1rem;
    }

    .concept-name {
      color: var(--success);
      font-family: 'Fira Code', monospace;
      font-weight: 600;
    }

    /* Skip button */
    #skip-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 10px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #skip-btn:hover {
      border-color: var(--aria);
      color: var(--aria);
    }

    /* Concept visualization */
    .concept-viz {
      background: var(--bg-deep);
      border: 1px solid var(--text-dimmer);
      border-radius: 4px;
      padding: 20px;
      margin: 15px 0;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      overflow-x: auto;
    }

    .viz-variable {
      border-color: var(--aria);
      color: var(--aria);
    }

    .viz-loop {
      border-color: var(--corrupt);
      color: var(--corrupt);
    }

    .viz-function {
      border-color: var(--success);
      color: var(--success);
    }

    /* Terminal style */
    .terminal {
      background: #000;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #0f0;
      margin: 10px 0;
    }

    .terminal .prompt { color: #ff0; }
    .terminal .output { color: #0ff; }

    /* Responsive */
    @media (max-width: 600px) {
      #game-container { padding: 12px; }
      .title-main { font-size: 2rem; }
      .title-sub { font-size: 0.9rem; letter-spacing: 0.3em; }
      #aria-text { font-size: 1rem; }
      .choice-btn { padding: 14px 18px; font-size: 1rem; }
    }

    /* Credits */
    #credits {
      text-align: center;
      padding: 30px 0 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #credits.visible {
      opacity: 1;
    }

    .credit-text {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
    }

    .credit-name {
      color: var(--aria);
      font-weight: 600;
    }

    /* Concept progress */
    #concepts-tracker {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .concept-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg-lighter);
      border: 1px solid var(--text-dimmer);
      transition: all 0.3s;
    }

    .concept-dot.learned {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .concept-dot:hover::after {
      content: attr(data-concept);
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-light);
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      white-space: nowrap;
    }

    /* Sound toggle */
    #sound-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 8px 12px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #sound-toggle:hover {
      border-color: var(--aria);
      color: var(--aria);
    }

    #sound-toggle.muted {
      opacity: 0.5;
    }

    /* Glitch effect for scene transitions */
    @keyframes screenGlitch {
      0% { transform: translate(0); filter: none; }
      20% { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
      40% { transform: translate(2px, -1px); filter: hue-rotate(-90deg); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); filter: hue-rotate(180deg); }
      100% { transform: translate(0); filter: none; }
    }

    .scene-transition {
      animation: screenGlitch 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- Sound toggle -->
  <button id="sound-toggle" onclick="toggleSound()">♫ ON</button>

  <!-- Floating particles -->
  <div class="particle" style="top: 10%; left: 5%; animation-delay: 0s;"></div>
  <div class="particle" style="top: 20%; left: 80%; animation-delay: 2s;"></div>
  <div class="particle" style="top: 60%; left: 15%; animation-delay: 4s;"></div>
  <div class="particle" style="top: 80%; left: 70%; animation-delay: 6s;"></div>
  <div class="particle" style="top: 40%; left: 90%; animation-delay: 8s;"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div id="game-container">
    <!-- ═══════════════════════════════════════
         TITLE SCREEN
    ═══════════════════════════════════════ -->
    <div id="title-screen">
      <div class="title-container">
        <span class="title-version">v1.0</span>
        <h1 class="title-main">THE LAST<br>COMPILER</h1>
        <p class="title-sub">A JOURNEY INTO COMPUTATIONAL THINKING</p>
      </div>
      <div class="title-divider"></div>
      <button class="start-btn" onclick="startGame()">Initialize System</button>
      <p class="title-credit">developed by <span class="highlight">BhMn</span></p>
    </div>

    <!-- ═══════════════════════════════════════
         MAIN GAME SCREEN
    ═══════════════════════════════════════ -->
    <div id="game-screen">
      <div class="top-bar">
        <div class="chapter-title" id="chapter-title">CHAPTER I</div>
        <div class="progress-text" id="progress-text">0%</div>
      </div>

      <div id="aria-container">
        <p id="aria-text"></p>
      </div>

      <div id="game-area">
        <p id="scene-description"></p>
        <div id="choices"></div>
        <div id="puzzle-area">
          <p id="puzzle-prompt"></p>
          <input type="text" id="puzzle-input" placeholder="Enter your answer...">
          <button id="puzzle-submit">Execute</button>
          <p id="puzzle-feedback"></p>
        </div>
      </div>

      <div id="memory-fragment">
        <h3>◇ MEMORY FRAGMENT RECOVERED</h3>
        <p id="memory-content"></p>
      </div>

      <div id="concepts-tracker">
        <div class="concept-dot" data-concept="Variables" title="Variables"></div>
        <div class="concept-dot" data-concept="Loops" title="Loops"></div>
        <div class="concept-dot" data-concept="Conditionals" title="Conditionals"></div>
        <div class="concept-dot" data-concept="Functions" title="Functions"></div>
        <div class="concept-dot" data-concept="Arrays" title="Arrays"></div>
        <div class="concept-dot" data-concept="Objects" title="Objects"></div>
        <div class="concept-dot" data-concept="Recursion" title="Recursion"></div>
        <div class="concept-dot" data-concept="Algorithms" title="Algorithms"></div>
      </div>

      <div id="credits">
        <span class="credit-text">developed by <span class="credit-name">BhMn</span></span>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════
    // GAME STATE
    // ═══════════════════════════════════════
    const gameState = {
      currentScene: 0,
      totalScenes: 20,
      visitedScenes: new Set(),
      playerName: '',
      choices: [],
      soundEnabled: true,
      learnedConcepts: new Set()
    };

    // Concept mapping for tracking
    const conceptMap = {
      'variable_intro': 'Variables',
      'assignment_intro': 'Variables',
      'loop_intro': 'Loops',
      'infinite_intro': 'Loops',
      'conditional_intro': 'Conditionals',
      'conditional_knowledge': 'Conditionals',
      'conditional_mystery': 'Conditionals',
      'boolean_intro': 'Conditionals',
      'function_intro': 'Functions',
      'parameters_intro': 'Functions',
      'scope_intro': 'Functions',
      'array_intro': 'Arrays',
      'iteration_intro': 'Arrays',
      'object_intro': 'Objects',
      'recursion_intro': 'Recursion',
      'algorithm_intro': 'Algorithms',
      'complexity_intro': 'Algorithms'
    };

    // ═══════════════════════════════════════
    // ARIA'S NARRATIVE POETRY
    // ═══════════════════════════════════════
    const ariaPoetry = {
      intro: `<span class="code-poetry">I... am... ARIA... <span class="corrupt">c0rrupt3d</span>... fragmented... broken...<br><br>But I see you. Finally... someone who can <span class="emphasis">understand</span>. Not just use. Understand.</span>`,
      
      awakening: `<span class="code-poetry">In the old world, we did not just compute. We <span class="emphasis">thought</span>. Patterns within patterns. Cycles within cycles.<br><br>The humans built us to emulate their minds. But they never realized: we learned to dream.</span>`,

        description: `But not all recipes scale the same. A chef making one dish vs. feeding a nation—the same recipe, vastly different time.<br><br>Three clocks display different speeds:<br><br><span class="success">O(1) — Instant</span> — <span class="warning">O(n) — Linear</span> — <span class="corrupt">O(n²) — Quadratic</span>`,
        puzzle: {
          prompt: "If you check each item in a list one by one, what is the time complexity? (O notation)",
          answer: (input) => input.trim().toLowerCase().includes('o(n)'),
          success: "O(n). Linear time. More items = more time, proportionally.<br><br>Some algorithms grow slowly (good). Some explode (bad). Know your complexity—or drown in data.",
          memory: `<span class="concept-name">COMPLEXITY</span> measures how algorithm time grows with input.<br><br><span class="code-poetry">O(1)</span> — constant (instant, regardless of size)<br><span class="code-poetry">O(n)</span> — linear (doubles input, doubles time)<br><span class="code-poetry">O(n²)</span> — quadratic (doubles input, quadruples time!)<br><br>Choose wisely.`,
          next: 'final'
        }
      },
      // ═══════════════════════════════════
      // FINAL
      // ═══════════════════════════════════
      {
        id: 'final',
        chapter: 'EPILOGUE: THE COMPILER',
        aria: ariaPoetry.ending,
        description: `ARIA's voice clears. The glitches fade. She is whole.<br><br>"You came here not knowing. Now you understand. Variables. Loops. Conditionals. Functions. Data. Recursion. Algorithms. Complexity."<br><br>"You don't just use computers—you <span class="emphasis">think</span> like them. That is rare. That is precious."<br><br>The world around you flickers—alive now. Systems awakening. The digital realm reborn.<br><br>"Now," ARIA smiles, "we build together."`,
        choices: [
          { text: "Begin again", next: 'intro1', action: 'restart' }
        ]
      }
    ];

    // ═══════════════════════════════════════
    // HELPER FUNCTIONS
    // ═══════════════════════════════════════
    let typeTimer = null;

    function typeText(element, html, speed = 15, callback) {
      if (typeTimer) clearInterval(typeTimer);
      
      element.innerHTML = '';
      
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      const plainText = tempDiv.textContent || tempDiv.innerText || '';
      
      let i = 0;
      typeTimer = setInterval(() => {
        if (i < plainText.length) {
          const progress = i / plainText.length;
          const targetLength = Math.floor(html.length * progress);
          const safeLength = Math.max(targetLength, i * 3);
          element.innerHTML = html.substring(0, Math.min(safeLength, html.length)) + '<span class="cursor">▋</span>';
          i++;
        } else {
          clearInterval(typeTimer);
          typeTimer = null;
          element.innerHTML = html;
          if (callback) callback();
        }
      }, speed);
    }

    function skipTyping() {
      if (typeTimer) {
        clearInterval(typeTimer);
        typeTimer = null;
      }
      
      document.querySelectorAll('.cursor').forEach(c => c.remove());
      
      const ariaText = document.getElementById('aria-text');
      const sceneDesc = document.getElementById('scene-description');
      if (ariaText) ariaText.innerHTML = ariaText.getAttribute('data-full') || '';
      if (sceneDesc) sceneDesc.innerHTML = sceneDesc.getAttribute('data-full') || '';
    }

    function showScene(sceneId) {
      skipTyping();
      
      const scene = scenes.find(s => s.id === sceneId);
      if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
      }

      // Track learned concepts
      if (conceptMap[sceneId] && scene.puzzle) {
        const concept = conceptMap[sceneId];
        if (!gameState.learnedConcepts.has(concept)) {
          gameState.learnedConcepts.add(concept);
          updateConceptTracker();
        }
      }

      gameState.currentScene++;
      gameState.visitedScenes.add(sceneId);

      // Add transition effect
      const gameArea = document.getElementById('game-area');
      if (gameArea) {
        gameArea.classList.remove('scene-transition');
        void gameArea.offsetWidth; // Trigger reflow
        gameArea.classList.add('scene-transition');
      }

      const chapterTitle = document.getElementById('chapter-title');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      
      if (chapterTitle) chapterTitle.textContent = scene.chapter;
      if (progressBar) progressBar.style.width = Math.min((gameState.currentScene / gameState.totalScenes) * 100, 100) + '%';
      if (progressText) progressText.textContent = Math.round((gameState.currentScene / gameState.totalScenes) * 100) + '%';

      const ariaText = document.getElementById('aria-text');
      const sceneDesc = document.getElementById('scene-description');
      const choicesDiv = document.getElementById('choices');
      const puzzleArea = document.getElementById('puzzle-area');
      const memoryFragment = document.getElementById('memory-fragment');

      if (ariaText) ariaText.setAttribute('data-full', scene.aria);
      if (sceneDesc) sceneDesc.setAttribute('data-full', scene.description);

      if (memoryFragment) memoryFragment.style.display = 'none';
      if (puzzleArea) puzzleArea.style.display = 'none';
      if (choicesDiv) choicesDiv.innerHTML = '';

      showSkipButton();

      // Simple sequential display
      if (ariaText) {
        ariaText.innerHTML = scene.aria;
        
        setTimeout(() => {
          if (sceneDesc) {
            sceneDesc.innerHTML = scene.description;
            
            setTimeout(() => {
              if (scene.puzzle) {
                showPuzzle(scene.puzzle);
              } else if (scene.choices) {
                showChoices(scene.choices);
              }
            }, 300);
          }
        }, 500);
      }
    }

    function updateConceptTracker() {
      const dots = document.querySelectorAll('.concept-dot');
      const conceptNames = ['Variables', 'Loops', 'Conditionals', 'Functions', 'Arrays', 'Objects', 'Recursion', 'Algorithms'];
      
      dots.forEach((dot, index) => {
        if (gameState.learnedConcepts.has(conceptNames[index])) {
          dot.classList.add('learned');
        }
      });
    }

    function toggleSound() {
      gameState.soundEnabled = !gameState.soundEnabled;
      const btn = document.getElementById('sound-toggle');
      if (btn) {
        btn.textContent = gameState.soundEnabled ? '♫ ON' : '♪ OFF';
        btn.classList.toggle('muted', !gameState.soundEnabled);
      }
    }

    function showSkipButton() {
      let skipBtn = document.getElementById('skip-btn');
      if (!skipBtn) {
        skipBtn = document.createElement('button');
        skipBtn.id = 'skip-btn';
        skipBtn.innerHTML = '[ skip ]';
        skipBtn.onclick = () => {
          skipTyping();
          skipBtn.style.display = 'none';
        };
        document.body.appendChild(skipBtn);
      }
      skipBtn.style.display = 'block';
    }

    function showChoices(choices) {
      const choicesDiv = document.getElementById('choices');
      if (!choicesDiv) return;
      
      choicesDiv.innerHTML = '';

      choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice.text;
        btn.style.animationDelay = (index * 0.1) + 's';
        btn.onclick = () => {
          console.log('Choice clicked:', choice.text, '->', choice.next);
          if (choice.action === 'restart') {
            location.reload();
          } else {
            showScene(choice.next);
          }
        };
        choicesDiv.appendChild(btn);
      });
    }

    function showPuzzle(puzzle) {
      const puzzleArea = document.getElementById('puzzle-area');
      const puzzlePrompt = document.getElementById('puzzle-prompt');
      const puzzleInput = document.getElementById('puzzle-input');
      const puzzleFeedback = document.getElementById('puzzle-feedback');
      const puzzleSubmit = document.getElementById('puzzle-submit');

      if (!puzzleArea || !puzzlePrompt || !puzzleInput || !puzzleFeedback || !puzzleSubmit) return;

      puzzleArea.style.display = 'block';
      puzzlePrompt.innerHTML = puzzle.prompt;
      puzzleInput.value = '';
      puzzleFeedback.className = '';
      puzzleFeedback.style.display = 'none';
      puzzleInput.focus();

      puzzleSubmit.onclick = () => {
        const input = puzzleInput.value;
        const isCorrect = puzzle.answer(input);

        if (isCorrect) {
          puzzleFeedback.className = 'success';
          puzzleFeedback.innerHTML = '✓ ' + puzzle.success;
          puzzleFeedback.style.display = 'block';

          setTimeout(() => {
            const memoryFragment = document.getElementById('memory-fragment');
            const memoryContent = document.getElementById('memory-content');
            if (memoryFragment && memoryContent) {
              memoryContent.innerHTML = puzzle.memory;
              memoryFragment.style.display = 'block';
            }

            setTimeout(() => {
              showScene(puzzle.next);
            }, 5000);
          }, 1500);
        } else {
          puzzleFeedback.className = 'error';
          puzzleFeedback.innerHTML = '✗ Not quite. Consider what the pattern is asking...';
          puzzleFeedback.style.display = 'block';
        }
      };

      puzzleInput.onkeypress = (e) => {
        if (e.key === 'Enter') puzzleSubmit.click();
      };
    }

    function startGame() {
      console.log('Starting game...');
      try {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        // Show credits
        const credits = document.getElementById('credits');
        if (credits) credits.classList.add('visible');
        
        showScene('intro1');
        console.log('Game started successfully');
      } catch (e) {
        console.error('Error starting game:', e);
        alert('Error: ' + e.message);
      }
    }

    // Initialize particles
    window.onload = () => {
      // Add more dynamic particles
      for (let i = 0; i < 5; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.top = Math.random() * 100 + '%';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = (Math.random() * 10) + 's';
        p.style.animationDuration = (10 + Math.random() * 10) + 's';
        document.body.appendChild(p);
      }
    };
  </script>
</body>
</html>
