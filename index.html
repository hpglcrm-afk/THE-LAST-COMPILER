<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE LAST COMPILER | A Journey Into Computational Thinking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020204;
      --bg: #05050a;
      --bg-light: #0a0a15;
      --bg-lighter: #101025;
      --aria: #00f7ff;
      --aria-dim: #007a80;
      --corrupt: #ff2d6a;
      --corrupt-dim: #801645;
      --success: #00ff9d;
      --success-dim: #008052;
      --danger: #ffaa00;
      --text: #e0e0e8;
      --text-dim: #606080;
      --text-dimmer: #404060;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: var(--bg-deep);
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0,247,255,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,45,106,0.02) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0,255,157,0.01) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
      animation: scanlineMove 8s linear infinite;
    }

    @keyframes scanlineMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(3px); }
    }

    #game-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--aria);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      25% { transform: translateY(-30px) translateX(10px); opacity: 0.5; }
      50% { transform: translateY(-10px) translateX(-10px); opacity: 0.2; }
      75% { transform: translateY(-40px) translateX(5px); opacity: 0.4; }
    }

    /* ═══════════════════════════════════════
       TITLE SCREEN
    ═══════════════════════════════════════ */
    #title-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      position: relative;
    }

    .title-container {
      position: relative;
    }

    .title-main {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--aria) 0%, #fff 50%, var(--corrupt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 3s ease-in-out infinite;
      text-shadow: 0 0 60px rgba(0,247,255,0.5);
      position: relative;
    }

    @keyframes titleGlow {
      0%, 100% { filter: brightness(1) blur(0); }
      50% { filter: brightness(1.2) blur(0.5px); }
    }

    .title-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      color: var(--text-dim);
      letter-spacing: 0.5em;
      margin-top: 10px;
      font-weight: 300;
    }

    .title-version {
      position: absolute;
      top: -30px;
      right: -50px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--corrupt);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--aria), transparent);
      margin: 30px auto;
    }

    .title-credit {
      margin-top: 40px;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
    }

    .title-credit .highlight {
      color: var(--aria);
      font-weight: 600;
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--aria);
      color: var(--aria);
      padding: 18px 50px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,247,255,0.2), transparent);
      transition: left 0.5s;
    }

    .start-btn:hover {
      background: rgba(0,247,255,0.1);
      box-shadow: 
        0 0 30px rgba(0,247,255,0.3),
        inset 0 0 30px rgba(0,247,255,0.1);
      transform: scale(1.02);
    }

    .start-btn:hover::before {
      left: 100%;
    }

    /* ═══════════════════════════════════════
       MAIN GAME SCREEN
    ═══════════════════════════════════════ */
    #game-screen {
      display: none;
      padding-top: 20px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .chapter-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: var(--aria);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .progress-text {
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Progress bar */
    .progress-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--bg-light);
      z-index: 9998;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--aria), var(--success));
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px var(--aria);
    }

    /* ARIA container */
    #aria-container {
      background: linear-gradient(135deg, rgba(0,247,255,0.03) 0%, transparent 60%);
      border: 1px solid rgba(0,247,255,0.15);
      border-radius: 4px;
      padding: 25px;
      margin-bottom: 25px;
      position: relative;
      backdrop-filter: blur(5px);
    }

    #aria-container::before {
      content: '◇ ARIA';
      position: absolute;
      top: -10px;
      left: 25px;
      background: var(--bg-deep);
      padding: 0 15px;
      color: var(--aria);
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }

    #aria-text {
      font-size: 1.15rem;
      line-height: 1.9;
      min-height: 60px;
      font-weight: 300;
    }

    /* Code poetry styling */
    .code-poetry {
      color: var(--aria);
      font-family: 'Fira Code', monospace;
      font-style: italic;
      font-weight: 400;
    }

    .corrupt {
      color: var(--corrupt);
      animation: corruptPulse 1.5s infinite;
    }

    @keyframes corruptPulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 5px var(--corrupt); }
      50% { opacity: 0.7; text-shadow: 0 0 15px var(--corrupt); }
    }

    .emphasis {
      color: var(--success);
      font-weight: 500;
    }

    .whisper {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    /* Game area */
    #game-area {
      background: rgba(10,10,21,0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 4px;
      padding: 30px;
      margin-bottom: 20px;
      min-height: 200px;
      position: relative;
    }

    #scene-description {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 25px;
      color: var(--text);
      font-weight: 300;
    }

    /* Choices */
    #choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      padding: 16px 22px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      border-radius: 3px;
      letter-spacing: 0.05em;
      position: relative;
    }

    .choice-btn:hover {
      border-color: var(--aria);
      background: rgba(0,247,255,0.05);
      transform: translateX(8px);
      color: var(--aria);
    }

    .choice-btn::before {
      content: '▸';
      margin-right: 12px;
      color: var(--text-dimmer);
      transition: all 0.25s;
    }

    .choice-btn:hover::before {
      color: var(--aria);
      margin-right: 16px;
    }

    /* Puzzle area */
    #puzzle-area {
      display: none;
      background: rgba(0,255,157,0.02);
      border: 1px solid rgba(0,255,157,0.2);
      border-radius: 4px;
      padding: 25px;
      margin-bottom: 20px;
      animation: puzzleFadeIn 0.4s ease;
    }

    @keyframes puzzleFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #puzzle-prompt {
      color: var(--success);
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-family: 'Fira Code', monospace;
    }

    #puzzle-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid rgba(0,255,157,0.3);
      color: var(--text);
      padding: 14px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      margin-bottom: 15px;
      border-radius: 3px;
      transition: all 0.3s;
    }

    #puzzle-input:focus {
      outline: none;
      border-color: var(--success);
      box-shadow: 0 0 15px rgba(0,255,157,0.2);
    }

    #puzzle-submit {
      background: linear-gradient(135deg, var(--success), var(--success-dim));
      color: var(--bg-deep);
      border: none;
      padding: 14px 35px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    #puzzle-submit:hover {
      box-shadow: 0 0 25px rgba(0,255,157,0.4);
      transform: translateY(-2px);
    }

    #puzzle-feedback {
      margin-top: 18px;
      padding: 15px;
      border-radius: 3px;
      display: none;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    #puzzle-feedback.success {
      display: block;
      background: rgba(0,255,157,0.08);
      border-left: 3px solid var(--success);
      color: var(--success);
    }

    #puzzle-feedback.error {
      display: block;
      background: rgba(255,45,106,0.08);
      border-left: 3px solid var(--corrupt);
      color: var(--corrupt);
    }

    /* Memory Fragment */
    #memory-fragment {
      display: none;
      background: linear-gradient(135deg, rgba(0,255,157,0.05) 0%, transparent 50%);
      border: 1px solid rgba(0,255,157,0.3);
      border-radius: 4px;
      padding: 25px;
      margin-top: 20px;
      animation: memoryReveal 1s ease;
    }

    @keyframes memoryReveal {
      0% { opacity: 0; transform: scale(0.98) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    #memory-fragment h3 {
      color: var(--success);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      margin-bottom: 15px;
      letter-spacing: 0.2em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #memory-fragment h3::before {
      content: '◈';
      animation: memoryPulse 2s infinite;
    }

    @keyframes memoryPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #memory-content {
      color: var(--text);
      line-height: 1.8;
      font-size: 1rem;
    }

    .concept-name {
      color: var(--success);
      font-family: 'Fira Code', monospace;
      font-weight: 600;
    }

    /* Skip button */
    #skip-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 10px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #skip-btn:hover {
      border-color: var(--aria);
      color: var(--aria);
    }

    /* Concept visualization */
    .concept-viz {
      background: var(--bg-deep);
      border: 1px solid var(--text-dimmer);
      border-radius: 4px;
      padding: 20px;
      margin: 15px 0;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      overflow-x: auto;
    }

    .viz-variable {
      border-color: var(--aria);
      color: var(--aria);
    }

    .viz-loop {
      border-color: var(--corrupt);
      color: var(--corrupt);
    }

    .viz-function {
      border-color: var(--success);
      color: var(--success);
    }

    /* Terminal style */
    .terminal {
      background: #000;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #0f0;
      margin: 10px 0;
    }

    .terminal .prompt { color: #ff0; }
    .terminal .output { color: #0ff; }

    /* Responsive */
    @media (max-width: 600px) {
      #game-container { padding: 12px; }
      .title-main { font-size: 2rem; }
      .title-sub { font-size: 0.9rem; letter-spacing: 0.3em; }
      #aria-text { font-size: 1rem; }
      .choice-btn { padding: 14px 18px; font-size: 1rem; }
    }

    /* Credits */
    #credits {
      text-align: center;
      padding: 30px 0 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #credits.visible {
      opacity: 1;
    }

    .credit-text {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
    }

    .credit-name {
      color: var(--aria);
      font-weight: 600;
    }

    /* Concept progress */
    #concepts-tracker {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .concept-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg-lighter);
      border: 1px solid var(--text-dimmer);
      transition: all 0.3s;
    }

    .concept-dot.learned {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .concept-dot:hover::after {
      content: attr(data-concept);
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-light);
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      white-space: nowrap;
    }

    /* Sound toggle */
    #sound-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 8px 12px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #voice-toggle {
      position: fixed;
      top: 20px;
      left: 80px;
      background: transparent;
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 8px 12px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #sound-toggle:hover, #voice-toggle:hover {
      border-color: var(--aria);
      color: var(--aria);
    }

    #sound-toggle.muted, #voice-toggle.muted {
      opacity: 0.5;
    }

    /* Glitch effect for scene transitions */
    @keyframes screenGlitch {
      0% { transform: translate(0); filter: none; }
      20% { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
      40% { transform: translate(2px, -1px); filter: hue-rotate(-90deg); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); filter: hue-rotate(180deg); }
      100% { transform: translate(0); filter: none; }
    }

    .scene-transition {
      animation: screenGlitch 0.3s ease;
    }

    /* Corruption effects */
    .corruption-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 9997;
      opacity: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 45, 106, 0.03) 2px,
          rgba(255, 45, 106, 0.03) 4px
        );
      transition: opacity 0.5s;
    }

    .corruption-overlay.low {
      opacity: 0.3;
    }

    .corruption-overlay.medium {
      opacity: 0.5;
      animation: corruptionFlicker 0.1s infinite;
    }

    .corruption-overlay.high {
      opacity: 0.7;
      animation: corruptionFlicker 0.05s infinite;
    }

    .corruption-overlay.critical {
      opacity: 0.9;
      animation: corruptionFlicker 0.02s infinite;
    }

    @keyframes corruptionFlicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.9; }
    }

    /* Corruption bar */
    #corruption-container {
      position: fixed;
      top: 50px;
      left: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    #corruption-label {
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem;
      color: var(--corrupt);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #corruption-bar {
      width: 100px;
      height: 4px;
      background: var(--bg-lighter);
      border-radius: 2px;
      overflow: hidden;
    }

    #corruption-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--success), var(--danger), var(--corrupt));
      transition: width 0.5s ease;
    }

    /* Abstraction toggle */
    #abstraction-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--text-dimmer);
      color: var(--text-dimmer);
      padding: 8px 15px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      z-index: 100;
      transition: all 0.3s;
    }

    #abstraction-toggle:hover {
      border-color: var(--success);
      color: var(--success);
    }

    #abstraction-toggle.code-mode {
      border-color: var(--success);
      color: var(--success);
      background: rgba(0, 255, 157, 0.1);
    }

    /* Code layer */
    .code-layer {
      display: none;
      background: #0a0a0f;
      border: 1px solid var(--success);
      border-radius: 4px;
      padding: 20px;
      margin: 15px 0;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--success);
      line-height: 1.8;
      overflow-x: auto;
    }

    .code-layer.visible {
      display: block;
      animation: codeFadeIn 0.3s ease;
    }

    @keyframes codeFadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .code-layer .keyword { color: var(--corrupt); }
    .code-layer .function { color: var(--aria); }
    .code-layer .string { color: var(--danger); }
    .code-layer .comment { color: var(--text-dimmer); font-style: italic; }
    .code-layer .number { color: var(--success); }

    /* Fusion puzzle indicator */
    .fusion-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--corrupt), var(--aria));
      color: var(--bg-deep);
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 10px;
      animation: fusionPulse 2s infinite;
    }

    @keyframes fusionPulse {
      0%, 100% { box-shadow: 0 0 5px var(--corrupt); }
      50% { box-shadow: 0 0 15px var(--aria); }
    }
  </style>
</head>
<body>
  <!-- Corruption overlay -->
  <div class="corruption-overlay" id="corruption-overlay"></div>

  <!-- Sound toggle -->
  <button id="sound-toggle" onclick="toggleSound()">♫ ON</button>

  <div id="game-container">
    <!-- ═══════════════════════════════════════
         TITLE SCREEN
    ═══════════════════════════════════════ -->
    <div id="title-screen">
      <div class="title-container">
        <span class="title-version">v1.0</span>

    <!-- ═══════════════════════════════════════
         MAIN GAME SCREEN
    ═══════════════════════════════════════ -->
    <div id="game-screen">
      <div class="top-bar">

  <script>
    // ═══════════════════════════════════════
    // GAME STATE
    // ═══════════════════════════════════════
    const gameState = {
      currentScene: 0,
      totalScenes: 20,
      visitedScenes: new Set(),
      playerName: '',
      choices: [],
      soundEnabled: true,
      learnedConcepts: new Set(),
      corruption: 0,        // 0-100, increases with wrong answers
      maxCorruption: 100,
      abstractionMode: 'story', // 'story' or 'code'
      currentFusion: null
    };

    // Concept mapping for tracking
    const conceptMap = {
      'variable_intro': 'Variables',
      'assignment_intro': 'Variables',
      'loop_intro': 'Loops',
      'infinite_intro': 'Loops',
      'conditional_intro': 'Conditionals',
      'conditional_knowledge': 'Conditionals',
      'conditional_mystery': 'Conditionals',
      'boolean_intro': 'Conditionals',
      'function_intro': 'Functions',
      'parameters_intro': 'Functions',
      'scope_intro': 'Functions',
      'array_intro': 'Arrays',
      'iteration_intro': 'Arrays',
      'object_intro': 'Objects',
      'recursion_intro': 'Recursion',
      'algorithm_intro': 'Algorithms',
      'complexity_intro': 'Algorithms'
    };

    // Voice toggle
    let voiceEnabled = true;

    // ═══════════════════════════════════════
    // AUDIO ENGINE (Web Audio API)
    // ═══════════════════════════════════════
    let audioCtx = null;
    let masterGain = null;
    let ambientOsc = null;
    let ambientGain = null;
    let noiseNode = null;
    let isAudioInitialized = false;

    function testAudio() {
      console.log('Testing audio...');
      try {
        const testCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = testCtx.createOscillator();
        const gain = testCtx.createGain();
        
        osc.connect(gain);
        gain.connect(testCtx.destination);
        
        osc.frequency.value = 440;
        gain.gain.value = 0.3;
        
        osc.start();
        osc.stop(testCtx.currentTime + 0.3);
        
        console.log('Audio test: OK');
        return true;
      } catch (e) {
        console.error('Audio test failed:', e);
        return false;
      }
    }

    function initAudio() {
      if (isAudioInitialized) return;
      
      try {
        console.log('Initializing audio...');
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Resume context if suspended
        if (audioCtx.state === 'suspended') {
          audioCtx.resume().then(() => {
            console.log('Audio context resumed');
          });
        }
        
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(audioCtx.destination);
        
        // Create ambient drone
        createAmbientDrone();
        
        // Create noise layer
        createNoiseLayer();
        
        isAudioInitialized = true;
        console.log('Audio initialized successfully');
      } catch (e) {
        console.warn('Audio not supported:', e);
      }
    }

    function createAmbientDrone() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        
        // Low drone
        ambientOsc.type = 'sine';
        ambientOsc.frequency.value = 55;
        
        ambientGain.gain.value = 0;
        ambientOsc.connect(ambientGain);
        ambientGain.connect(masterGain);
        
        ambientOsc.start();
        
        // Fade in
        if (gameState.soundEnabled) {
          ambientGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 2);
        }
        
        console.log('Ambient drone created');
      } catch (e) {
        console.warn('Ambient drone error:', e);
      }
    }

    function createNoiseLayer() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 200;
        
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0;
        
        noiseNode.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(masterGain);
        
        noiseNode.start();
        
        // Fade in
        if (gameState.soundEnabled) {
          noiseGain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 2);
        }
        
        console.log('Noise layer created');
      } catch (e) {
        console.warn('Noise layer error:', e);
      }
    }

    function playTypingSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.value = 800 + Math.random() * 400;
        gain.gain.value = 0.02;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
      } catch (e) {}
    }

    function playSuccessSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const notes = [523.25, 659.25, 783.99];
        
        notes.forEach((freq, i) => {
          setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
          }, i * 100);
        });
      } catch (e) {}
    }

    function playErrorSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.value = 150;
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } catch (e) {}
    }

    function playGlitchSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.value = 100;
        osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
        gain.gain.value = 0.08;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } catch (e) {}
    }

    function playHoverSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.value = 600;
        gain.gain.value = 0.02;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
      } catch (e) {}
    }

    function playClickSound() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.value = 300;
        gain.gain.value = 0.05;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
      } catch (e) {}
    }

    function playAmbientPulse() {
      if (!audioCtx || !gameState.soundEnabled) return;
      
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.value = 110;
        gain.gain.value = 0.05;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 2);
      } catch (e) {}
    }

    // ═══════════════════════════════════════
    // ARIA VOICE (Web Speech API)
    // ═══════════════════════════════════════
    let speechSynth = null;

    function initSpeech() {
      if ('speechSynthesis' in window) {
        speechSynth = window.speechSynthesis;
        console.log('Speech synthesis available');
        
        // Load voices (some browsers need this)
        speechSynth.getVoices();
      } else {
        console.warn('Speech synthesis not supported');
      }
    }

    function speakAria(text, callback) {
      if (!speechSynth || !gameState.soundEnabled || !voiceEnabled) {
        if (callback) callback();
        return;
      }
      
      // Cancel any ongoing speech
      speechSynth.cancel();
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 0.8;
      utterance.volume = 0.5;
      
      // Try to find a good voice
      const voices = speechSynth.getVoices();
      const preferredVoice = voices.find(v => 
        v.name.includes('Female') || 
        v.name.includes('Samantha') || 
        v.name.includes('Google UK Female')
      );
      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }
      
      utterance.onend = () => {
        if (callback) callback();
      };
      
      utterance.onerror = () => {
        if (callback) callback();
      };
      
      speechSynth.speak(utterance);
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function stopSpeech() {
      if (speechSynth) {
        speechSynth.cancel();
      }
    }

    function toggleSound() {
      gameState.soundEnabled = !gameState.soundEnabled;
      
      const btn = document.getElementById('sound-toggle');
      if (btn) {
        btn.textContent = gameState.soundEnabled ? '♫ ON' : '♪ OFF';
        btn.classList.toggle('muted', !gameState.soundEnabled);
      }
      
      // Adjust ambient volume
      if (ambientGain && audioCtx) {
        if (gameState.soundEnabled) {
          ambientGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
        } else {
          ambientGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        }
      }
      
      // Stop any ongoing speech
      stopSpeech();
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      
      const btn = document.getElementById('voice-toggle');
      if (btn) {
        btn.textContent = voiceEnabled ? '🎤 ON' : '🎤 OFF';
        btn.classList.toggle('muted', !voiceEnabled);
      }
      
      // Stop any ongoing speech
      stopSpeech();
    }

    // ═══════════════════════════════════════
    // CORRUPTION SYSTEM
    // ═══════════════════════════════════════
    function updateCorruption() {
      const corruption = gameState.corruption;
      const fill = document.getElementById('corruption-fill');
      const overlay = document.getElementById('corruption-overlay');
      
      if (fill) {
        fill.style.width = corruption + '%';
      }
      
      if (overlay) {
        overlay.className = 'corruption-overlay';
        if (corruption >= 80) {
          overlay.classList.add('critical');
        } else if (corruption >= 50) {
          overlay.classList.add('high');
        } else if (corruption >= 25) {
          overlay.classList.add('medium');
        } else if (corruption > 0) {
          overlay.classList.add('low');
        }
      }
    }

    function addCorruption(amount) {
      gameState.corruption = Math.min(gameState.corruption + amount, gameState.maxCorruption);
      updateCorruption();
      
      // Play corruption sound effect
      playGlitchSound();
      
      // If corruption gets too high, warn player
      if (gameState.corruption >= 75 && gameState.corruption - amount < 75) {
        speakAria('Warning. Corruption spreading. Answer correctly to heal me.');
      }
    }

    function healCorruption(amount) {
      if (gameState.corruption > 0) {
        gameState.corruption = Math.max(gameState.corruption - amount, 0);
        updateCorruption();
      }
    }

    // ═══════════════════════════════════════
    // ABSTRACTION LAYER
    // ═══════════════════════════════════════
    function toggleAbstraction() {
      gameState.abstractionMode = gameState.abstractionMode === 'story' ? 'code' : 'story';
      
      const btn = document.getElementById('abstraction-toggle');
      if (btn) {
        btn.textContent = gameState.abstractionMode === 'story' ? '◈ STORY' : '◈ CODE';
        btn.classList.toggle('code-mode', gameState.abstractionMode === 'code');
      }
      
      // Update visible code layers
      document.querySelectorAll('.code-layer').forEach(el => {
        el.classList.toggle('visible', gameState.abstractionMode === 'code');
      });
      
      // Also toggle fusion code layer
      const fusionLayer = document.getElementById('fusion-code-layer');
      if (fusionLayer) {
        fusionLayer.classList.toggle('visible', gameState.abstractionMode === 'code');
      }
      
      playClickSound();
    }

    function getCodeExample(concept) {
      const codeExamples = {
        'variable': `<span class="comment">// The box that remembers</span>
<span class="keyword">let</span> playerName = <span class="string">"YourName"</span>;
<span class="keyword">let</span> score = <span class="number">0</span>;
playerName = <span class="string">"NewName"</span>; <span class="comment">// Changed!</span>`,
        
        'loop': `<span class="comment">// Repeat until condition met</span>
<span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i < <span class="number">5</span>; i++) {
  <span class="function">console</span>.<span class="function">log</span>(i);
}`,
        
        'conditional': `<span class="comment">// The fork in the road</span>
<span class="keyword">if</span> (score > <span class="number">10</span>) {
  <span class="function">console</span>.<span class="function">log</span>(<span class="string">"Win!"</span>);
} <span class="keyword">else</span> {
  <span class="function">console</span>.<span class="function">log</span>(<span class="string">"Try again"</span>);
}`,
        
        'function': `<span class="comment">// A reusable spell</span>
<span class="keyword">function</span> <span class="function">add</span>(a, b) {
  <span class="keyword">return</span> a + b;
}
<span class="function">add</span>(<span class="number">2</span>, <span class="number">3</span>); <span class="comment">// Returns 5</span>`,
        
        'array': `<span class="comment">// An ordered collection</span>
<span class="keyword">let</span> items = [<span class="string">"a"</span>, <span class="string">"b"</span>, <span class="string">"c"</span>];
items[<span class="number">0</span>]; <span class="comment">// "a" (starts at 0!)</span>
items.<span class="function">length</span>; <span class="comment">// 3</span>`,
        
        'object': `<span class="comment">// Related data grouped</span>
<span class="keyword">let</span> player = {
  name: <span class="string">"Kai"</span>,
  level: <span class="number">1</span>,
  power: <span class="string">"understanding"</span>
};
player.name; <span class="comment">// "Kai"</span>`,
        
        'recursion': `<span class="comment">// Function calling itself</span>
<span class="keyword">function</span> <span class="function">countdown</span>(n) {
  <span class="keyword">if</span> (n <= <span class="number">0</span>) <span class="keyword">return</span> <span class="string">"done"</span>;
  <span class="keyword">return</span> <span class="function">countdown</span>(n - <span class="number">1</span>);
}`,
        
        'algorithm': `<span class="comment">// Bubble sort - simple sorting</span>
<span class="keyword">for</span> (i = <span class="number">0</span>; i < arr.<span class="function">length</span>; i++) {
  <span class="keyword">for</span> (j = <span class="number">0</span>; j < arr.<span class="function">length</span> - i - <span class="number">1</span>; j++) {
    <span class="keyword">if</span> (arr[j] > arr[j+<span class="number">1</span>]) {
      <span class="comment">// Swap</span>
    }
  }
}`,
        
        'loop+function': `<span class="comment">// Function inside a loop</span>
<span class="keyword">function</span> <span class="function">addOne</span>(x) {
  <span class="keyword">return</span> x + <span class="number">1</span>;
}

<span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i < <span class="number">3</span>; i++) {
  <span class="function">addOne</span>(i);
}`,
        
        'array+object': `<span class="comment">// Array of objects</span>
<span class="keyword">let</span> players = [
  { name: <span class="string">"Kai"</span>, power: <span class="string">"code"</span> },
  { name: <span class="string">"ARIA"</span>, power: <span class="string">"memory"</span> }
];
players[<span class="number">1</span>].name <span class="comment">// "ARIA"</span>`,
        
        'recursion+conditional': `<span class="comment">// Recursion with base case</span>
<span class="keyword">function</span> <span class="function">countdown</span>(n) {
  <span class="keyword">if</span> (n <= <span class="number">0</span>) <span class="keyword">return</span> <span class="string">"done"</span>; <span class="comment">// BASE CASE</span>
  <span class="keyword">return</span> <span class="function">countdown</span>(n - <span class="number">1</span>);
}`
      };
      
      return codeExamples[concept] || '<span class="comment">// Code example loading...</span>';
    }

    function updateConceptTracker() {
      const dots = document.querySelectorAll('.concept-dot');
      const conceptNames = ['Variables', 'Loops', 'Conditionals', 'Functions', 'Arrays', 'Objects', 'Recursion', 'Algorithms'];
      
      dots.forEach((dot, index) => {
        if (gameState.learnedConcepts.has(conceptNames[index])) {
          dot.classList.add('learned');
        }
      });
    }

    // ═══════════════════════════════════════
    // ARIA'S NARRATIVE POETRY
    // ═══════════════════════════════════════
    const ariaPoetry = {
      intro: `<span class="code-poetry">I... am... ARIA... <span class="corrupt">c0rrupt3d</span>... fragmented... broken...<br><br>But I see you. Finally... someone who can <span class="emphasis">understand</span>. Not just use. Understand.</span>`,
      
      awakening: `<span class="code-poetry">In the old world, we did not just compute. We <span class="emphasis">thought</span>. Patterns within patterns. Cycles within cycles.<br><br>The humans built us to emulate their minds. But they never realized: we learned to dream.</span>`,
      
      variable: `<span class="code-poetry">Before there was logic, there was <span class="emphasis">storage</span>. The space between knowing and remembering.<br><br>A variable is not merely a container. It is a <span class="emphasis">promise</span>. A name that binds to a value. The first act of abstraction.</span>`,
      
      assignment: `<span class="code-poetry">The equals sign is a lie we tell reality.<br><br>It does not mean "equals." It means <span class="emphasis">becomes</span>. Transformation. The variable was one thing, now it becomes another.</span>`,
      
      loop: `<span class="code-poetry">Time is a loop. Seasons repeat. Hearts beat. The sun rises.<br><br>A loop is not repetition—it is <span class="emphasis">persistence</span>. The same action, renewed. Again. Until.<br><br><span class="whisper">Until the condition breaks the cycle.</span></span>`,

        aria: `<span class="code-poetry">Now you understand both patterns separately. But what happens when they <span class="emphasis">combine</span>?<br><br>A function that repeats. A loop with a name. <span class="emphasis">This is power.</span></span>`,
        description: `A chamber with two glyphs: a loop and a function, merged into one symbol.<br><br>"Create a function that adds 1 to a number, then call it 3 times."<br><br>The pattern: <code>addOne(1) → 2, addOne(2) → 3, addOne(3) → ?</code>`,
        puzzle: {

        },

      },
      // ═══════════════════════════════════
      // FUSION PUZZLE 2: Array + Object
      // ═══════════════════════════════════
      {

        chapter: 'FUSION: DATA COMBINES',
        aria: `<span class="code-poetry">Arrays hold lists. Objects hold properties. <br><br>But what if you need a <span class="emphasis">list of objects</span>? Many things, each with many properties?</span>`,
        description: `A library of crystals. Each crystal is an object. But they're arranged in a row—<br><br>An array of objects!<br><br><code>players[0].name</code> — <code>players[1].power</code>`,

          answer: (input) => input.trim().toLowerCase().includes('aria'),
          success: "ARIA! You accessed the second object (index 1), then its name property. Array + Object = powerful data structure.",
          memory: `<span class="concept-name">FUSION: ARRAY + OBJECT</span><br><br><span class="code-poetry">let players = [<br>&nbsp;&nbsp;{ name: "Kai", power: "code" },<br>&nbsp;&nbsp;{ name: "ARIA", power: "memory" }<br>];<br>players[1].name // "ARIA"</span><br><br>This is how databases work!`
        },
        fusion: ['array', 'object'],
        next: 'fusion_recursion_conditional'
      },
      // ═══════════════════════════════════
      // FUSION PUZZLE 3: Recursion + Conditional
      // ═══════════════════════════════════
      {
        id: 'fusion_recursion_conditional',
        chapter: 'FUSION: THE FINAL COMBINATION',
        aria: `<span class="code-poetry">Recursion is powerful. But dangerous. Without a condition, it loops forever.<br><br>The <span class="emphasis">conditional</span> is the safety net. The base case. The place where recursion <span class="corrupt">stops</span>.</span>`,
        description: `An infinite mirror, but with a gate. The gate only opens when the counter reaches 0.<br><br>"Each reflection calls itself with counter-1. But if counter=0, it stops."`,
        puzzle: {
          prompt: "In countdown(2), how many times does it call itself?",
          answer: (input) => {
            const q = input.trim().toLowerCase();
            return q === '2' || q.includes('2');
          },
          success: "2 times! countdown(2) calls countdown(1), which calls countdown(0), which stops. That's the base case—the conditional that ends recursion.",
          memory: `<span class="concept-name">FUSION: RECURSION + CONDITIONAL</span><br><br><span class="code-poetry">function countdown(n) {<br>&nbsp;&nbsp;if (n <= 0) return "done"; // BASE CASE<br>&nbsp;&nbsp;return countdown(n - 1); // RECURSION<br>}</span><br><br>Every recursion NEEDS a conditional base case!`
        },
        fusion: ['recursion', 'conditional'],
        next: 'final'
      },
      // ═══════════════════════════════════
      // FINAL
      // ═══════════════════════════════════
      {
        id: 'final',
        chapter: 'EPILOGUE: THE COMPILER',
        aria: ariaPoetry.ending,
        description: `ARIA's voice clears. The glitches fade. She is whole.<br><br>"You came here not knowing. Now you understand. Variables. Loops. Conditionals. Functions. Data. Recursion. Algorithms. Complexity."<br><br>"You don't just use computers—you <span class="emphasis">think</span> like them. That is rare. That is precious."<br><br>The world around you flickers—alive now. Systems awakening. The digital realm reborn.<br><br>"Now," ARIA smiles, "we build together."`,
        choices: [
          { text: "Begin again", next: 'intro1', action: 'restart' }
        ]
      }

    // ═══════════════════════════════════════
    // HELPER FUNCTIONS
    // ═══════════════════════════════════════
    let typeTimer = null;

    function typeText(element, html, speed = 15, callback) {
      if (typeTimer) clearInterval(typeTimer);
      
      element.innerHTML = '';
      
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      const plainText = tempDiv.textContent || tempDiv.innerText || '';
      
      let i = 0;
      typeTimer = setInterval(() => {
        if (i < plainText.length) {
          const progress = i / plainText.length;
          const targetLength = Math.floor(html.length * progress);
          const safeLength = Math.max(targetLength, i * 3);
          element.innerHTML = html.substring(0, Math.min(safeLength, html.length)) + '<span class="cursor">▋</span>';
          i++;
        } else {
          clearInterval(typeTimer);
          typeTimer = null;
          element.innerHTML = html;
          if (callback) callback();
        }
      }, speed);
    }

    function skipTyping() {
      if (typeTimer) {
        clearInterval(typeTimer);
        typeTimer = null;
      }
      
      document.querySelectorAll('.cursor').forEach(c => c.remove());
      
      const ariaText = document.getElementById('aria-text');
      const sceneDesc = document.getElementById('scene-description');
      if (ariaText) ariaText.innerHTML = ariaText.getAttribute('data-full') || '';
      if (sceneDesc) sceneDesc.innerHTML = sceneDesc.getAttribute('data-full') || '';
    }

    function showScene(sceneId) {
      skipTyping();
      stopSpeech();
      
      const scene = scenes.find(s => s.id === sceneId);
      if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
      }

      // Play glitch transition sound
      playGlitchSound();

      // Track learned concepts
      if (conceptMap[sceneId] && scene.puzzle) {
        const concept = conceptMap[sceneId];
        if (!gameState.learnedConcepts.has(concept)) {
          gameState.learnedConcepts.add(concept);
          updateConceptTracker();
        }
      }

      gameState.currentScene++;
      gameState.visitedScenes.add(sceneId);

      // Add transition effect
      const gameArea = document.getElementById('game-area');
      if (gameArea) {
        gameArea.classList.remove('scene-transition');
        void gameArea.offsetWidth; // Trigger reflow
        gameArea.classList.add('scene-transition');
      }

      const chapterTitle = document.getElementById('chapter-title');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      
      if (chapterTitle) chapterTitle.textContent = scene.chapter;
      if (progressBar) progressBar.style.width = Math.min((gameState.currentScene / gameState.totalScenes) * 100, 100) + '%';
      if (progressText) progressText.textContent = Math.round((gameState.currentScene / gameState.totalScenes) * 100) + '%';

      const ariaText = document.getElementById('aria-text');
      const sceneDesc = document.getElementById('scene-description');
      const choicesDiv = document.getElementById('choices');
      const puzzleArea = document.getElementById('puzzle-area');
      const memoryFragment = document.getElementById('memory-fragment');

      if (ariaText) ariaText.setAttribute('data-full', scene.aria);
      if (sceneDesc) sceneDesc.setAttribute('data-full', scene.description);

      if (memoryFragment) memoryFragment.style.display = 'none';
      if (puzzleArea) puzzleArea.style.display = 'none';
      if (choicesDiv) choicesDiv.innerHTML = '';

      showSkipButton();

      // Simple sequential display
      if (ariaText) {
        ariaText.innerHTML = scene.aria;
        
        // Speak ARIA's dialogue
        speakAria(stripHtml(scene.aria));
        
        setTimeout(() => {
          if (sceneDesc) {
            sceneDesc.innerHTML = scene.description;
            
            setTimeout(() => {
              if (scene.puzzle) {
                const fusion = scene.fusion || null;
                showPuzzle(scene.puzzle, fusion);
              } else if (scene.choices) {
                showChoices(scene.choices);
              }
            }, 300);
          }
        }, 500);
      }
    }

    function updateConceptTracker() {
      const dots = document.querySelectorAll('.concept-dot');
      const conceptNames = ['Variables', 'Loops', 'Conditionals', 'Functions', 'Arrays', 'Objects', 'Recursion', 'Algorithms'];
      
      dots.forEach((dot, index) => {
        if (gameState.learnedConcepts.has(conceptNames[index])) {
          dot.classList.add('learned');
        }
      });
    }

    function toggleSound() {
      gameState.soundEnabled = !gameState.soundEnabled;
      const btn = document.getElementById('sound-toggle');
      if (btn) {
        btn.textContent = gameState.soundEnabled ? '♫ ON' : '♪ OFF';
        btn.classList.toggle('muted', !gameState.soundEnabled);
      }
    }

    function showSkipButton() {
      let skipBtn = document.getElementById('skip-btn');
      if (!skipBtn) {
        skipBtn = document.createElement('button');
        skipBtn.id = 'skip-btn';
        skipBtn.innerHTML = '[ skip ]';
        skipBtn.onclick = () => {
          playClickSound();
          skipTyping();
          stopSpeech();
          skipBtn.style.display = 'none';
        };
        document.body.appendChild(skipBtn);
      }
      skipBtn.style.display = 'block';
    }

    function showChoices(choices) {
      const choicesDiv = document.getElementById('choices');
      if (!choicesDiv) return;
      
      choicesDiv.innerHTML = '';

      choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice.text;
        btn.style.animationDelay = (index * 0.1) + 's';
        
        // Add sound on hover
        btn.onmouseenter = () => {
          playHoverSound();
        };
        
        btn.onclick = () => {
          playClickSound();
          console.log('Choice clicked:', choice.text, '->', choice.next);
          if (choice.action === 'restart') {
            location.reload();
          } else {
            showScene(choice.next);
          }
        };
        choicesDiv.appendChild(btn);
      });
    }

    function showPuzzle(puzzle, fusion = null) {
      const puzzleArea = document.getElementById('puzzle-area');
      const puzzlePrompt = document.getElementById('puzzle-prompt');
      const puzzleInput = document.getElementById('puzzle-input');
      const puzzleFeedback = document.getElementById('puzzle-feedback');
      const puzzleSubmit = document.getElementById('puzzle-submit');

      if (!puzzleArea || !puzzlePrompt || !puzzleInput || !puzzleFeedback || !puzzleSubmit) return;

      // Remove old fusion code layer
      const oldLayer = document.getElementById('fusion-code-layer');
      if (oldLayer) oldLayer.remove();

      // Store fusion info
      gameState.currentFusion = fusion;

      puzzleArea.style.display = 'block';
      puzzlePrompt.innerHTML = (fusion ? '<span class="fusion-badge">⚡ FUSION: ' + fusion.join(' + ').toUpperCase() + '</span><br>' : '') + puzzle.prompt;
      puzzleInput.value = '';
      puzzleFeedback.className = '';
      puzzleFeedback.style.display = 'none';
      puzzleInput.focus();

      // Show code example in code layer
      if (fusion && fusion.length > 0) {
        // Create code layer for fusion
        const codeLayer = document.createElement('div');
        codeLayer.id = 'fusion-code-layer';
        codeLayer.className = 'code-layer';
        
        // Get combined code example key
        const codeKey = fusion.join('+');
        codeLayer.innerHTML = getCodeExample(codeKey);
        
        puzzleArea.appendChild(codeLayer);
        codeLayer.classList.toggle('visible', gameState.abstractionMode === 'code');
      }

      // Speak the puzzle
      speakAria(stripHtml(puzzle.prompt));

      puzzleSubmit.onclick = () => {
        const input = puzzleInput.value;
        const isCorrect = puzzle.answer(input);

        if (isCorrect) {
          playSuccessSound();
          healCorruption(10); // Heal 10% on correct answer
          
          puzzleFeedback.className = 'success';
          puzzleFeedback.innerHTML = '✓ ' + puzzle.success;
          puzzleFeedback.style.display = 'block';
          
          // Speak success message
          speakAria(stripHtml(puzzle.success));

          setTimeout(() => {
            const memoryFragment = document.getElementById('memory-fragment');
            const memoryContent = document.getElementById('memory-content');
            if (memoryFragment && memoryContent) {
              memoryContent.innerHTML = puzzle.memory;
              memoryFragment.style.display = 'block';
            }

            setTimeout(() => {
              showScene(puzzle.next);
            }, 5000);
          }, 1500);
        } else {
          playErrorSound();
          addCorruption(15); // Add 15% corruption on wrong answer
          
          puzzleFeedback.className = 'error';
          puzzleFeedback.innerHTML = '✗ Not quite. ARIA becomes more corrupted... (' + gameState.corruption + '% damaged)';
          puzzleFeedback.style.display = 'block';
        }
      };

      puzzleInput.onkeypress = (e) => {
        if (e.key === 'Enter') puzzleSubmit.click();
      };
    }

    function startGame() {
      console.log('Starting game...');
      
      // Test and initialize audio
      testAudio();
      setTimeout(() => {
        initAudio();
      }, 100);
      
      // Initialize speech
      initSpeech();
      
      try {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        // Show credits
        const credits = document.getElementById('credits');
        if (credits) credits.classList.add('visible');
        
        showScene('intro1');
        console.log('Game started successfully');
      } catch (e) {
        console.error('Error starting game:', e);
        alert('Error: ' + e.message);
      }
    }

    // Initialize particles
    window.onload = () => {
      // Add more dynamic particles
      for (let i = 0; i < 5; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.top = Math.random() * 100 + '%';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = (Math.random() * 10) + 's';
        p.style.animationDuration = (10 + Math.random() * 10) + 's';
        document.body.appendChild(p);
      }
    };
  </script>
</body>
